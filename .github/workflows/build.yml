name: Gerar Estrutura do Jarvis

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  construir-projeto:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o Repositório
        uses: actions/checkout@v4

      - name: Executar Script de Automação do Projeto
        run: |
          echo "🤖 Iniciando o protocolo de construção do Jarvis..."

          # Define os caminhos das pastas padrão do Android
          PACKAGE_DIR="app/src/main/java/com/seuprojeto/jarvis"
          RES_XML_DIR="app/src/main/res/xml"
          RES_VALUES_DIR="app/src/main/res/values"
          MANIFEST_PATH="app/src/main/AndroidManifest.xml"

          # Cria as pastas necessárias
          mkdir -p "$PACKAGE_DIR"
          mkdir -p "$RES_XML_DIR"
          mkdir -p "$RES_VALUES_DIR"

          echo "📂 Pastas criadas com sucesso."

          # 1. Cria o AndroidManifest.xml
          cat << 'EOF' > "$MANIFEST_PATH"
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.seuprojeto.jarvis">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <application
                  android:allowBackup="true"
                  android:label="Jarvis"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".JarvisAccessibilityService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/jarvis_accessibility_config" />
                  </service>
              </application>
          </manifest>
          EOF

          # 2. Cria o arquivo de configuração de acessibilidade
          cat << 'EOF' > "$RES_XML_DIR/jarvis_accessibility_config.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeAllMask"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagDefault|flagRetrieveInteractiveWindows|flagIncludeNotImportantViews|flagReportViewIds"
              android:canRetrieveWindowContent="true"
              android:canPerformGestures="true"
              android:description="@string/accessibility_description" />
          EOF

          # 3. Cria as strings
          cat << 'EOF' > "$RES_VALUES_DIR/strings.xml"
          <resources>
              <string name="app_name">Jarvis</string>
              <string name="accessibility_description">Permite ao Jarvis controle total para automatizar tarefas e interagir com a interface do sistema.</string>
          </resources>
          EOF

          # 4. Cria a MainActivity.kt
          cat << 'EOF' > "$PACKAGE_DIR/MainActivity.kt"
          package com.seuprojeto.jarvis

          import android.content.Intent
          import android.os.Bundle
          import android.provider.Settings
          import android.widget.Button
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  val btnAtivarJarvis = Button(this).apply {
                      text = "Dar Permissão Total ao Jarvis"
                      setOnClickListener {
                          startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
                      }
                  }
                  setContentView(btnAtivarJarvis)
              }
          }
          EOF

          # 5. Cria o JarvisAccessibilityService.kt
          cat << 'EOF' > "$PACKAGE_DIR/JarvisAccessibilityService.kt"
          package com.seuprojeto.jarvis

          import android.accessibilityservice.AccessibilityService
          import android.view.accessibility.AccessibilityEvent
          import android.util.Log

          class JarvisAccessibilityService : AccessibilityService() {
              override fun onAccessibilityEvent(event: AccessibilityEvent?) {
                  Log.d("JARVIS_EYES", "Analisando pacote: ${event?.packageName}")
              }
              override fun onInterrupt() {}
          }
          EOF

          echo "✅ Arquivos do Android gerados com sucesso dentro da esteira do GitHub!"
          
